<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lemonade - Upload Data Perfect Fit</title>
    <link rel="stylesheet" href="../../static/mar/mar_upload_data.css" />
</head>
<body>
    <div class="mkt-shell-fit">
        <aside class="mkt-sidebar">
            <div class="mkt-logo-box">
                <img src="../../static/img/img_lemonade.png" class="mkt-logo-icon">
                <img src="../../static/img/lemonade_logo.png" class="mkt-logo-text">
            </div>
            <nav class="mkt-nav">
                <div class="mkt-nav-item"><img src="../../static/img/mar/ic_dashboard.svg"><span>Dashboard</span></div>
                <div class="mkt-nav-item"><img src="../../static/img/mar/ic_seg_perform.svg"><span>Segment Performance</span></div>
                <div class="mkt-nav-item"><img src="../../static/img/mar/ic_cam_perform.svg"><span>Campaign Performance</span></div>
                <div class="mkt-nav-item"><img src="../../static/img/mar/ic_market_share_analysis.svg"><span>Market Share Analysis</span></div>
                <div class="mkt-nav-item active"><img src="../../static/img/mar/ic_upload_file.svg"><span>Upload Data</span></div>
            </nav>
            <div class="mkt-sidebar-bottom">
                <div class="mkt-nav-item logout"><img src="../../static/img/ic_sign_out.svg"><span>Sign Out</span></div>
                <img src="../../static/img/lemonade_logo.png" class="mkt-footer-logo">
            </div>
        </aside>

        <main class="mkt-main">
            <header class="mkt-header-white">
                <h1 class="mkt-page-title">Marketing department</h1>
                <div class="mkt-header-right">
                    <div class="mkt-top-search">
                        <img src="../../static/img/ic_search.svg">
                        <input type="text" placeholder="Search here...">
                    </div>
                    <div class="mkt-user-info">
                        <span class="mkt-email-bold">email: mkt_lemon.cos@bus.vn</span>
                        <img src="../../static/img/img_lemonade.png" class="mkt-avatar">
                    </div>
                </div>
            </header>

            <div class="mkt-content-view">
                <div class="mkt-giant-card-fit">
                    <div class="mkt-card-header">
                        <h2>Select Files</h2>
                        <p>Product contribution in total market</p>
                    </div>

                    <div class="mkt-upload-inner">
                        <div class="mkt-search-compact">
                            <img src="../../static/img/ic_search.svg">
                            <input type="text" placeholder="Add here...">
                            <button class="mkt-btn-browse">Browse</button>
                        </div>
                    </div>

                    <div class="mkt-action-row">
                        <button class="mkt-btn-upload">UPLOAD</button>
                        <button class="mkt-btn-cancel">CANCEL</button>
                    </div>
                </div>
            </div>

            <footer class="mkt-footer-bar">
                <button class="mkt-back-btn" onclick="window.history.back()">
                    <img src="../../static/img/ic_back.svg"><span>Back</span>
                </button>
            </footer>
        </main>
    </div>
</body>
</html>
