<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Lemonade Management System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='user_info.css') }}" />
</head>
<body>
    <div class="user-info-screen">
        <div class="lemonade-container">
            <div class="welcome-text">Welcome to</div>
            <div class="logo-wrapper">
                <img class="logo-img" src="{{ url_for('static', filename='img/img_lemonade.png') }}" alt="Logo">
                <span class="logo-text">LEMONADE</span>
            </div>
        </div>

        <div class="user-info-panel">
            <div class="user-icon-wrapper">
                <img src="{{ url_for('static', filename='img/user.svg') }}" alt="User Icon">
            </div>

            <div class="instruction">
                <span style="border: 1px solid #000; border-radius: 50%; width: 16px; height: 16px; display: inline-flex; justify-content: center; align-items: center; font-size: 11px;">i</span>
                Please check and fill in your information carefully
            </div>

            <div class="form-group">
                <label>Department</label>
                <input type="text" placeholder="Sales">
            </div>

            <div class="form-group">
                <label>Department’s<br>Manager</label>
                <input type="text" placeholder="Manager Name">
            </div>

            <div class="form-group">
                <label>Phone</label>
                <input type="text" placeholder="Your phone number">
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" placeholder="email@lemonade.vn">
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" placeholder="********">
            </div>

            <div class="button-group">
                <button class="btn-confirm">Confirm</button>
                <button class="btn-logout">Log out</button>
            </div>
        </div>
    </div>
</body>
</html>
