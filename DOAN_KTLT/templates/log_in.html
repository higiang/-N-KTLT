<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8" />
    <title>Login | Lemonade</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500&family=Poppins:wght@600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='log_in.css') }}" />
</head>
<body>
    <div class="main-layout">
        <div class="form-side">
            <div class="form-wrapper">
                <h1 class="title">Log in</h1>
                <p class="subtitle">Let your beauty speak for itself.</p>
                <form method="POST" action="{{ url_for('login') }}">
                    {% if error %}

                        <p style="color: #ff6b6b; text-align: center; font-size: 14px; margin-bottom: 10px;">
                            {{ error }}
                        </p>
                    {% endif %}
                    <input type="email" class="input-item" name ="email" placeholder="Email" required>
                    <input type="password" class="input-item" name = "password" placeholder="Password" required>
                    <div class="role-group">
                        <label><input type="radio" name="role" value = "admin"> Admin</label>
                        <label><input type="radio" name="role" value = "user"> User</label>
                    </div>
                    <button type="submit" class="btn-submit">Log in</button>
                </form>
                <p class="link-text">New to Lemonade? <a href="{{ url_for('signup') }}">Create an account</a></p>
            </div>
        </div>
        <div class="decor-side">
            <img src="{{ url_for('static', filename='img/brand_logo.png') }}" class="bg-image">
            <img src="{{ url_for('static', filename='img/lemon_decor.png') }}" class="lemon-image">
        </div>
    </div>
</body>
</html>
