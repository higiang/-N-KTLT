<!DOCTYPE html>
<html lang="vi"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<link rel="stylesheet" href="{{ url_for('static', filename='mar/mar_market_share_analysis.css') }}">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<title>Market Share Analysis</title>
</head><body>
<script>
async function exportFile(url) {
    const res = await fetch(url);
    const data = await res.json();
    alert(data.message);
}
</script>
<div class="mkt-container">
<aside class="mkt-sidebar">
  <div class="brand-box">
    <img src="{{ url_for('static', filename='img/img_lemonade.png') }}" class="logo-img">
    <img src="{{ url_for('static', filename='img/lemonade_logo.png') }}" class="brand-img">
  </div>
  <nav class="mkt-nav">
    <div class="mkt-nav-item" onclick="location.href='/mkt/dashboard'"><img src="{{ url_for('static', filename='img/mar/ic_dashboard.svg') }}"><span>Dashboard</span></div>
    <div class="mkt-nav-item" onclick="location.href='/mkt/segment'"><img src="{{ url_for('static', filename='img/mar/ic_seg_perform.svg') }}"><span>Segment Performance</span></div>
    <div class="mkt-nav-item" onclick="location.href='/mkt/campaign'"><img src="{{ url_for('static', filename='img/mar/ic_cam_perform.svg') }}"><span>Campaign Performance</span></div>
    <div class="mkt-nav-item active" onclick="location.href='/mkt/market-share'"><img src="{{ url_for('static', filename='img/mar/ic_market_share_analysis.svg') }}"><span>Market Share Analysis</span></div>
    <div class="mkt-nav-item" onclick="location.href='/mkt/upload'"><img src="{{ url_for('static', filename='img/mar/ic_upload_file.svg') }}"><span>Upload Data</span></div>
  </nav>
  <div class="mkt-sidebar-bottom">
    <div class="mkt-nav-item" onclick="window.location.href='/signout'"><img src="{{ url_for('static', filename='img/ic_sign_out.svg') }}"><span>Sign Out</span></div>
    <img src="{{ url_for('static', filename='img/lemonade_logo.png') }}" class="footer-img">
  </div>
</aside>
<main class="mkt-main">
  <header class="mkt-header">
    <h1 class="mkt-title">Marketing Department</h1>
    <div class="mkt-header-right">
      <div class="mkt-profile">
        <span class="mkt-email-bold">email: mkt_lemon.cos@bus.vn</span>
        <img src="{{ url_for('static', filename='img/img_lemonade.png') }}" class="mkt-avatar">
      </div>
    </div>
  </header>
  <div class="mkt-content">
    <div class="mkt-section-top">
      <div class="title-group"><h2>Market Share Report</h2><p>Product contribution in total market</p></div>
      <button class="mkt-export-btn" onclick="exportFile('/api/market-share/export')"><img src="{{ url_for('static', filename='img/ic_export.svg') }}"><span>Export</span></button>
    </div>
    <div class="mkt-kpi-grid">
      <div class="mkt-card orange">
        <div class="mkt-icon-circle"><img src="{{ url_for('static', filename='img/ic_dashboard_orange.svg') }}"></div>
        <div class="mkt-card-data"><span class="mkt-val" id="ms-top">--</span><span class="mkt-label" id="ms-top-name">Top Product</span></div>
      </div>
      <div class="mkt-card green">
        <div class="mkt-icon-circle"><img src="{{ url_for('static', filename='img/ic_dashboard_green.svg') }}"></div>
        <div class="mkt-card-data"><span class="mkt-val" id="ms-trend">--</span><span class="mkt-label">Share Trend</span></div>
      </div>
    </div>
    <div class="mkt-chart-card">
      <h3>Analytics</h3>
      <p id="ms-period" style="font-size:13px;color:#737791;margin-bottom:10px"></p>
      <div style="display:flex;align-items:center;gap:40px;flex-wrap:wrap">
        <div style="position:relative;width:220px;height:220px"><canvas id="pieChart"></canvas></div>
        <div id="pieLegend" style="display:flex;flex-direction:column;gap:12px;font-size:14px;color:#425166"></div>
      </div>
    </div>
  </div>
  <footer class="mkt-footer">
      {% if is_admin %}
      <button class="mkt-back-btn" onclick="window.location.href='/dashboard'">
        <img src="{{ url_for('static', filename='img/ic_back.svg') }}"><span>Back</span>
      </button>
      {% else %}
      <button class="mkt-back-btn" style="opacity: 0.4; cursor: not-allowed;" title="Chỉ CEO mới có quyền quay lại trang tổng quan">
        <img src="{{ url_for('static', filename='img/ic_back.svg') }}"><span>Back</span>
      </button>
      {% endif %}
  </footer>
</main>
</div>
<script>
async function loadKPIs(){
  const d=await(await fetch('/api/market-share/kpis')).json();
  document.getElementById('ms-top').textContent=d.top_product.value;
  document.getElementById('ms-top-name').textContent=d.top_product.product||'Top Product';
  document.getElementById('ms-trend').textContent=d.share_trend.value;
}
async function loadPie(){
  const d=await(await fetch('/api/market-share/pie')).json();
  document.getElementById('ms-period').textContent='Period: '+d.period;
  new Chart(document.getElementById('pieChart'),{type:'doughnut',
    data:{labels:d.labels,datasets:[{data:d.values,backgroundColor:d.colors,borderWidth:2,borderColor:'#fff'}]},
    options:{responsive:true,maintainAspectRatio:false,cutout:'55%',
      plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>ctx.label+': '+ctx.parsed+'%'}}}}});
  document.getElementById('pieLegend').innerHTML=d.labels.map((l,i)=>`
    <div style="display:flex;align-items:center;gap:10px">
      <span style="width:14px;height:14px;background:${d.colors[i]};border-radius:3px;flex-shrink:0"></span>
      <span>${l}</span>
      <strong style="margin-left:auto;color:#151D48">${d.values[i]}%</strong>
    </div>`).join('');
}
loadKPIs(); loadPie();
</script>
<script>
async function exportFile(url) {
    const res = await fetch(url);
    const data = await res.json();
    alert(data.message);
}
</script>
</body></html>
