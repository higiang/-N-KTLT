<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Lemonade Management System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='global.css') }}" />
    <link rel="stylesheet" href="{{ url_for('static', filename='inv.css/inv_productlist.css') }}" />
    <style>
        :root {
            --side-menu-bg: #F0F7FF;
            --primary-blue: #5D5FEF;
            --text-grey: #737791;
        }
        body {
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
            background-color: #F9FAFB;
            font-family: 'Inter', sans-serif;
        }

        /* SIDEBAR */
        .menu-sidebar {
            width: 280px;
            background-color: var(--side-menu-bg);
            display: flex;
            flex-direction: column;
            border-right: 1px solid #E5E7EB;
            flex-shrink: 0;
        }

        .logo-section {
            padding: 40px 30px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* Quả chanh ở Sidebar không khung */
        .sidebar-lemon {
            width: 32px;
            height: 32px;
            object-fit: contain;
        }

        .nav-group { flex: 1; }

        .nav-item {
            display: flex;
            align-items: center;
            padding: 14px 30px;
            color: var(--text-grey);
            text-decoration: none;
            font-weight: 500;
            margin: 4px 15px;
            border-radius: 12px;
            transition: 0.3s;
        }

        .nav-item.active {
            background-color: var(--primary-blue);
            color: white;
            box-shadow: 0 10px 20px rgba(93, 95, 239, 0.2);
        }

        .nav-item img { margin-right: 15px; width: 22px; }
        .nav-item.active img { filter: brightness(0) invert(1); }

        .sidebar-footer { padding: 20px 0; margin-top: auto; }
        .brand-footer-text {
            padding: 10px 30px 30px 30px;
            color: #005691;
            font-size: 26px;
            font-weight: 900;
            letter-spacing: 2px;
        }

        /* MAIN CONTENT */
        .main-content {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            flex-shrink: 0;
        }

        .search-container { position: relative; }
        .search-bar {
            background: #F4F7FF;
            border: none;
            border-radius: 15px;
            padding: 12px 20px 12px 45px;
            width: 300px;
            outline: none;
        }
        .search-icon { position: absolute; left: 15px; top: 13px; width: 18px; opacity: 0.5; }

        /* Quả chanh ở Header không khung */
        .header-lemon {
            width: 40px;
            height: 40px;
            object-fit: contain;
        }

        /* CARD & TABLE */
        .card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            margin-bottom: 30px;
        }

        .data-table { width: 100%; border-collapse: collapse; }
        .data-table th {
            text-align: left;
            color: #96A0AF;
            padding: 15px;
            border-bottom: 1px solid #F3F4F6;
            font-size: 14px;
        }
        .data-table td { padding: 20px 15px; border-bottom: 1px solid #F9FAFB; font-weight: 500; color: #050B20; }

        /* NÚT BACK CỐ ĐỊNH */
        .fixed-back-container {
            position: fixed;
            bottom: 30px;
            right: 40px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            z-index: 1000;
        }
        .back-circle {
            width: 28px;
            height: 28px;
            border: 1.5px solid var(--text-grey);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>
    <div class="menu-sidebar">
        <div class="logo-section">
            <img src="{{ url_for('static', filename='img/img_lemonade.png') }}" class="sidebar-lemon">
            <img src="{{ url_for('static', filename='img/lemonade_logo.png') }}" width="110">
        </div>

        <div class="nav-group">
            <a href="#" class="nav-item">
                <img src="{{ url_for('static', filename='img/inventory/ic_dashboard.svg') }}"> Dashboard
            </a>
            <a href="#" class="nav-item active">
                <img src="{{ url_for('static', filename='img/inventory/ic_product_list.svg') }}"> Product List
            </a>
            <a href="#" class="nav-item">
                <img src="{{ url_for('static', filename='img/inventory/ic_supplier.svg') }}"> Supplier
            </a>
        </div>

        <div class="sidebar-footer">
            <a href="#" class="nav-item">
                <img src="{{ url_for('static', filename='img/ic_sign_out.svg') }}"> Sign Out
            </a>
            <div class="brand-footer-text">LEMONADE</div>
        </div>
    </div>

    <div class="main-content">
        <div class="header-section">
            <h1 style="font-size: 32px; font-weight: 700; color: #050B20; margin: 0;">Inventory Manager</h1>

            <div style="display: flex; align-items: center; gap: 30px;">
                <div class="search-container">
                    <input type="text" class="search-bar" placeholder="Search here...">
                    <img src="{{ url_for('static', filename='img/ic_search.svg') }}" class="search-icon">
                </div>

                <div style="display: flex; align-items: center; gap: 15px;">
                    <span style="font-size: 11px; font-weight: 500; color: #000;">email: inv_lemon.cos@bus.vn</span>
                    <img src="{{ url_for('static', filename='img/img_lemonade.png') }}" class="header-lemon">
                </div>
            </div>
        </div>

        <div class="card">
            <h2 style="font-size: 20px; margin: 0 0 20px 0;">All Products</h2>
            <table class="data-table">
                <thead>
                    <tr>
                        <th>Product Name</th>
                        <th>SKU</th>
                        <th>Stock</th>
                        <th>Price</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>Son Kem Lì - A06</td>
                        <td style="color: var(--text-grey);">#LM00</td>
                        <td>45</td>
                        <td style="font-weight: 700;">190.000</td>
                    </tr>
                    <tr>
                        <td>Phấn nước Cushion</td>
                        <td style="color: var(--text-grey);">#LM89</td>
                        <td>02</td>
                        <td style="font-weight: 700;">210.000</td>
                    </tr>
                    <tr>
                        <td>Kẻ mắt nước</td>
                        <td style="color: var(--text-grey);">#LM00</td>
                        <td>128</td>
                        <td style="font-weight: 700;">170.000</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="card" style="margin-bottom: 100px;">
            <h2 style="font-size: 20px; margin: 0 0 20px 0;">Stock Quantity</h2>
            <div style="height: 300px; display: flex; align-items: center; justify-content: center; background: #fafafa; border-radius: 15px;">
                <p style="color: #ccc;">[Biểu đồ Stock Quantity]</p>
            </div>
        </div>
    </div>

    <div class="fixed-back-container" onclick="window.history.back()">
        <div class="back-circle">
            <img src="{{ url_for('static', filename='img/ic_back.svg') }}" style="width: 12px; filter: grayscale(1);">
        </div>
        <span style="color: var(--text-grey); font-weight: 500; font-size: 14px;">Back</span>
    </div>
</body>
</html>
