<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Lemonade Management System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='inv/inv_productlist.css') }}" />
</head>
<body>
    <div class="menu-sidebar">
        <div class="logo-section">
            <img src="{{ url_for('static', filename='img/img_lemonade.png') }}" class="sidebar-lemon">
            <img src="{{ url_for('static', filename='img/lemonade_logo.png') }}" width="110">
        </div>

        <div class="nav-group">
            <a href="#" class="nav-item">
                <img src="{{ url_for('static', filename='img/inventory/ic_dashboard.svg') }}"> Dashboard
            </a>
            <a href="#" class="nav-item active">
                <img src="{{ url_for('static', filename='img/inventory/ic_product_list.svg') }}"> Product List
            </a>
            <a href="#" class="nav-item">
                <img src="{{ url_for('static', filename='img/inventory/ic_supplier.svg') }}"> Supplier
            </a>
        </div>

        <div class="sidebar-footer">
            <a href="#" class="nav-item">
                <img src="{{ url_for('static', filename='img/ic_sign_out.svg') }}"> Sign Out
            </a>
            <div class="brand-footer-text">LEMONADE</div>
        </div>
    </div>

    <div class="main-content">
        <div class="header-section">
            <h1 style="font-size: 32px; font-weight: 700; color: #050B20; margin: 0;">Inventory Manager</h1>

            <div style="display: flex; align-items: center; gap: 30px;">
                <div class="search-container">
                    <input type="text" class="search-bar" placeholder="Search here...">
                    <img src="{{ url_for('static', filename='img/ic_search.svg') }}" class="search-icon">
                </div>

                <div style="display: flex; align-items: center; gap: 15px;">
                    <span style="font-size: 11px; font-weight: 500; color: #000;"><b>email: inv_lemon.cos@bus.vn</b></span>
                    <img src="{{ url_for('static', filename='img/img_lemonade.png') }}" class="header-lemon">
                </div>
            </div>
        </div>

        <div class="card">
            <h2 style="font-size: 20px; margin: 0 0 20px 0;">All Products</h2>
            <table class="data-table">
                <thead>
                    <tr>
                        <th>Product Name</th>
                        <th>SKU</th>
                        <th>Stock</th>
                        <th>Price</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>Son Kem Lì - A06</td>
                        <td style="color: #737791;">#LM00</td>
                        <td>45</td>
                        <td style="font-weight: 700;">190.000</td>
                    </tr>
                    <tr>
                        <td>Phấn nước Cushion</td>
                        <td style="color: #737791;">#LM89</td>
                        <td>02</td>
                        <td style="font-weight: 700;">210.000</td>
                    </tr>
                    <tr>
                        <td>Kẻ mắt nước</td>
                        <td style="color: #737791;">#LM00</td>
                        <td>128</td>
                        <td style="font-weight: 700;">170.000</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="card" style="margin-bottom: 100px;">
            <h2 style="font-size: 20px; margin: 0 0 20px 0;">Stock Quantity</h2>
            <div style="height: 300px; display: flex; align-items: center; justify-content: center; background: #fafafa; border-radius: 15px;">
                <p style="color: #ccc;">[Biểu đồ Stock Quantity]</p>
            </div>
        </div>
    </div>

    <div class="fixed-back-container" onclick="window.history.back()">
        <div class="back-circle">
            <img src="{{ url_for('static', filename='img/ic_back.svg') }}" style="width: 12px; filter: grayscale(1);">
        </div>
        <span style="color: #737791; font-weight: 500; font-size: 14px;">Back</span>
    </div>
</body>
</html>
