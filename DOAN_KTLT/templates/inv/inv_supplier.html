<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Lemonade - Supplier List</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='inv/inv_supplier.css') }}" />
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <div class="logo-top">
                <img src="{{ url_for('static', filename='img/img_lemonade.png') }}" width="40">
                <img src="{{ url_for('static', filename='img/lemonade_logo.png') }}" width="150">
            </div>

            <nav class="nav-menu">
                <a href="#" class="nav-item">
                    <img src="{{ url_for('static', filename='img/inventory/ic_dashboard.svg') }}">
                    <span>Dashboard</span>
                </a>
                <a href="#" class="nav-item">
                    <img src="{{ url_for('static', filename='img/inventory/ic_product_list.svg') }}">
                    <span>Product List</span>
                </a>
                <a href="#" class="nav-item active">
                    <img src="{{ url_for('static', filename='img/inventory/ic_supplier.svg') }}">
                    <span>Supplier</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <a href="#" class="nav-item sign-out-item">
                    <img src="{{ url_for('static', filename='img/ic_sign_out.svg') }}">
                    <span>Sign Out</span>
                </a>
                <img src="{{ url_for('static', filename='img/lemonade_logo.png') }}" class="brand-footer-img">
            </div>
        </aside>

        <main class="main">
            <header class="header">
                <h2 class="dept-title">Inventory Department</h2>

                <div class="search-bar">
                    <img src="{{ url_for('static', filename='img/ic_search.svg') }}" width="22">
                    <input type="text" placeholder="Search here...">
                </div>

                <div class="admin-info">
                    <span class="email-text"><b>email: inv_lemon.cos@bus.vn</b></span>
                    <img src="{{ url_for('static', filename='img/img_lemonade.png') }}" width="25">
                </div>
            </header>

            <div class="table-card">
                <h1 class="table-title">Supplier List</h1>

                <div class="internal-search">
                    <img src="{{ url_for('static', filename='img/ic_search.svg') }}" width="18">
                    <input type="text" placeholder="Search here...">
                </div>

                <div class="table-header">
                    <div class="col1">Company Name</div>
                    <div class="col2">Phone</div>
                    <div class="col3">Category</div>
                    <div class="col4">Location</div>
                </div>

                <div class="table-row">
                    <div class="col1">Bình Minh Group</div>
                    <div class="col2">0909.123.456</div>
                    <div class="col3">Tem, nhãn dán</div>
                    <div class="col4">TP. Hồ Chí Minh</div>
                </div>
            </div>

            <div class="footer-controls">
                <div class="pagination"> < Prev &nbsp; 1 &nbsp; 2 &nbsp; 3 &nbsp; Next > </div>
                <div class="back-btn-minimal" onclick="window.history.back()">
                    <img src="{{ url_for('static', filename='img/ic_back.svg') }}" width="14">
                    <span>Back</span>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
