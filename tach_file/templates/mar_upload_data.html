<!DOCTYPE html>
<html lang="vi"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<link rel="stylesheet" href="{{ url_for('static', filename='mar/mar_upload_data.css') }}">
<title>Upload Data</title>
</head><body>
<div class="mkt-shell-fit">
<aside class="mkt-sidebar">
  <div class="mkt-logo-box">
    <img src="{{ url_for('static', filename='img/img_lemonade.png') }}" class="mkt-logo-icon">
    <img src="{{ url_for('static', filename='img/lemonade_logo.png') }}" class="mkt-logo-text">
  </div>
  <nav class="mkt-nav">
    <div class="mkt-nav-item" onclick="location.href='/mkt/dashboard'"><img src="{{ url_for('static', filename='img/mar/ic_dashboard.svg') }}"><span>Dashboard</span></div>
    <div class="mkt-nav-item" onclick="location.href='/mkt/segment'"><img src="{{ url_for('static', filename='img/mar/ic_seg_perform.svg') }}"><span>Segment Performance</span></div>
    <div class="mkt-nav-item" onclick="location.href='/mkt/campaign'"><img src="{{ url_for('static', filename='img/mar/ic_cam_perform.svg') }}"><span>Campaign Performance</span></div>
    <div class="mkt-nav-item" onclick="location.href='/mkt/market-share'"><img src="{{ url_for('static', filename='img/mar/ic_market_share_analysis.svg') }}"><span>Market Share Analysis</span></div>
    <div class="mkt-nav-item active" onclick="location.href='/mkt/upload'"><img src="{{ url_for('static', filename='img/mar/ic_upload_file.svg') }}"><span>Upload Data</span></div>
  </nav>
  <div class="mkt-sidebar-bottom">
    <div class="mkt-nav-item logout" onclick="window.location.href='/signout'"><img src="{{ url_for('static', filename='img/ic_sign_out.svg') }}"><span>Sign Out</span></div>
    <img src="{{ url_for('static', filename='img/lemonade_logo.png') }}" class="mkt-footer-logo">
  </div>
</aside>
<main class="mkt-main">
  <header class="mkt-header-white">
    <h1 class="mkt-page-title">Marketing Department</h1>
    <div class="mkt-header-right">
      <div class="mkt-user-info">
        <span class="mkt-email-bold">email: marketing@gmail.com</span>
        <img src="{{ url_for('static', filename='img/img_lemonade.png') }}" class="mkt-avatar">
      </div>
    </div>
  </header>
  <div class="mkt-content-view">
    <div class="mkt-giant-card-fit">
      <div class="mkt-card-header">
        <h2>Select Files</h2>
        <p>Upload CSV file to import campaign data</p>
      </div>
      <div class="mkt-upload-inner">
        <div class="mkt-search-compact">
          <img src="{{ url_for('static', filename='img/ic_search.svg') }}">
          <input type="text" id="fileNameDisplay" placeholder="No file selected..." readonly>
          <button class="mkt-btn-browse" onclick="document.getElementById('fileInput').click()">Browse</button>
          <input type="file" id="fileInput" accept=".csv" style="display:none" onchange="onFileSelected(this)">
        </div>
      </div>
      <!-- Status message -->
      <div id="uploadStatus" style="text-align:center;font-size:14px;min-height:24px;color:#737791"></div>
      <div class="mkt-action-row">
        <button class="mkt-btn-upload" onclick="doUpload()">UPLOAD</button>
        <button class="mkt-btn-cancel" onclick="cancelUpload()">CANCEL</button>
      </div>
    </div>
  </div>
  <footer class="mkt-footer-bar">
      {% if is_admin %}
      <button class="mkt-back-btn" onclick="window.location.href='/dashboard'">
        <img src="{{ url_for('static', filename='img/ic_back.svg') }}"><span>Back</span>
      </button>
      {% else %}
      <button class="mkt-back-btn" style="opacity: 0.4; cursor: not-allowed;" title="Chỉ CEO mới có quyền quay lại trang tổng quan">
        <img src="{{ url_for('static', filename='img/ic_back.svg') }}"><span>Back</span>
      </button>
      {% endif %}
  </footer>
</main>
</div>
<script>
let selectedFile = null;

function onFileSelected(input){
  selectedFile = input.files[0];
  if(selectedFile){
    document.getElementById('fileNameDisplay').value = selectedFile.name;
    document.getElementById('uploadStatus').textContent = 'File ready: ' + selectedFile.name;
    document.getElementById('uploadStatus').style.color = '#737791';
  }
}

async function doUpload(){
  if(!selectedFile){
    showStatus('Vui lòng chọn file CSV trước!', '#FA5A7D'); return;
  }
  showStatus('Đang upload...', '#5D5FEF');
  const fd = new FormData();
  fd.append('file', selectedFile);
  try {
    const res  = await fetch('/api/upload', {method:'POST', body:fd});
    const data = await res.json();
    if(data.success){
      showStatus(`✓ ${data.message} (${data.skipped} dòng bỏ qua)`, '#00AC4F');
      selectedFile = null;
      document.getElementById('fileNameDisplay').value = '';
      document.getElementById('fileInput').value = '';
    } else {
      showStatus('✗ ' + data.error, '#FA5A7D');
    }
  } catch(e) {
    showStatus('✗ Lỗi kết nối server', '#FA5A7D');
  }
}

function cancelUpload(){
  selectedFile = null;
  document.getElementById('fileNameDisplay').value = '';
  document.getElementById('fileInput').value = '';
  showStatus('', '#737791');
}

function showStatus(msg, color){
  const el = document.getElementById('uploadStatus');
  el.textContent = msg; el.style.color = color;
}
</script>
</body></html>
